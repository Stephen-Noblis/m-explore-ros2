serial_number: j100-0001
version: 0

system:
  hosts:
    - hostname: j100-0001
      ip: 127.0.0.1
  ros2:
    namespace: j100_0001
  workspaces:
    - /root/clearpath_ws/install/setup.bash

platform:
  enable_ekf: true

sensors:
  imu:
    - model: microstrain_imu
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.0, 0.0, 0.1]
      rpy: [0.0, 0.0, 0.0]

  lidar2d:
    - model: hokuyo_ust
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.2, 0.0, 0.15]
      rpy: [0.0, 0.0, 0.0]

  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: default_mount
      xyz: [0.12, 0.0, 0.06]  # Front of Jackal, slightly elevated
      rpy: [0.0, 0.0, 0.0]    # Facing forward